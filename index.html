<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Radiko番組検索PWA</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e88e5">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 { font-size: 20px; }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 16px;
    }
    ul { padding: 0; }
    li {
      list-style: none;
      background: #fff;
      margin-top: 8px;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>Radiko 番組検索</h1>

<input id="keyword" placeholder="番組名・出演者">
<button onclick="search()">検索</button>

<ul id="result"></ul>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
</body>
</html>
